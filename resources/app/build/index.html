<!doctype html><html><head><meta charset="utf-8"><title>Kitten4 Ultra</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
    #kitten-loader-wrap {
      position: fixed; visibility: visible; width: 100%; height: 100%; top: 0; left: 0; z-index: 99;
      background: rgba(5, 5, 8, 0.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      text-align: center; display: flex; justify-content: center;
      flex-direction: column; align-items: center;
      transition: opacity 0.6s ease, backdrop-filter 0.8s ease, -webkit-backdrop-filter 0.8s ease, background 0.6s ease;
      overflow: hidden; font-family: 'Outfit', 'Noto Sans SC', 'PingFang SC', sans-serif;
    }
    #kitten-loader-wrap.k4-loader-done {
      opacity: 0; pointer-events: none;
      backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      background: rgba(5, 5, 8, 0);
    }
    #root { height: 100%; width: 100%; position: relative; z-index: 0; }
    .kitten-loader-background {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 20% 80%, rgba(88,60,220,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0,180,255,0.05) 0%, transparent 50%);
    }
    .kitten-loader-grid {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      -webkit-mask-image: radial-gradient(ellipse 70% 50% at 50% 60%, black 20%, transparent 70%);
      mask-image: radial-gradient(ellipse 70% 50% at 50% 60%, black 20%, transparent 70%);
      animation: gridPulse 8s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    .kitten-loader-scanline {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,180,255,0.01) 50%);
      background-size: 100% 3px;
    }
    .kitten-loader-glow {
      position: absolute; top: 50%; left: 50%; width: 600px; height: 600px; z-index: 0; pointer-events: none;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 40% 50%, rgba(88,60,220,0.06) 0%, transparent 50%),
                  radial-gradient(circle at 60% 50%, rgba(0,180,255,0.04) 0%, transparent 50%);
      animation: glowOrbit 6s ease-in-out infinite alternate;
    }
    @keyframes glowOrbit { 0%{transform:translate(-50%,-50%) scale(1)} 100%{transform:translate(-50%,-50%) scale(1.12)} }
    .kitten-loader-container { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .kitten-loader-logo {
      font-size: 72px; font-weight: 900; letter-spacing: 12px; color: #fff; text-transform: uppercase;
      text-shadow: 0 0 20px rgba(88,60,220,0.5), 0 0 50px rgba(88,60,220,0.25), 0 0 100px rgba(88,60,220,0.1);
      animation: logoReveal 1.2s ease-out forwards; margin-bottom: 10px; opacity: 0; transform: translateY(20px);
    }
    @keyframes logoReveal { 0%{opacity:0;transform:translateY(20px);letter-spacing:28px;filter:blur(4px)} 100%{opacity:1;transform:translateY(0);letter-spacing:12px;filter:blur(0)} }
    .kitten-loader-logo span {
      background: linear-gradient(135deg, #583cdc, #00b4ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .kitten-loader-subtitle {
      font-size: 12px; font-weight: 300; color: rgba(255,255,255,0.45); letter-spacing: 5px;
      text-transform: uppercase; margin-bottom: 48px; animation: subtitleReveal 0.8s ease-out 0.4s forwards; opacity: 0;
    }
    @keyframes subtitleReveal { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:0.7;transform:translateY(0)} }
    .progress-bar-area {
      width: 280px; height: 1px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden;
    }
    .progress-bar-area::after {
      content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 40%;
      background: linear-gradient(90deg, #583cdc, #00b4ff, #583cdc); background-size: 200% 100%;
      animation: pBar 3s ease-in-out infinite, pBarShimmer 2s linear infinite;
      box-shadow: 0 0 12px rgba(88,60,220,0.3);
    }
    @keyframes pBar { 0%{left:-40%} 50%{left:65%} 100%{left:-40%} }
    @keyframes pBarShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .k4-build-indicator {
      position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); z-index: 2; display: flex; gap: 12px; pointer-events: none;
    }
    .k4-build-dot {
      width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.1);
      transition: background 0.6s ease, box-shadow 0.6s ease;
    }
    .k4-build-dot.loaded {
      background: rgba(88,60,220,0.6); box-shadow: 0 0 8px rgba(88,60,220,0.3);
    }
    .kitten-loader-container .text { margin-top: 20px; font-size: 11px; font-weight: 300; color: rgba(255,255,255,0.3); letter-spacing: 3px; }
    #offline-text {
      box-sizing: border-box; margin: 16px auto 0; padding: 6px 16px; border: 1px solid rgba(255,255,255,0.06); border-radius: 4px;
      font-size: 10px; font-weight: 300; letter-spacing: 2px; color: rgba(255,255,255,0.25); background: transparent;
      transition: all 0.3s ease; cursor: pointer; display: inline-block;
    }
    #offline-text:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.12); }
    .kitten-loader-corner { position: absolute; z-index: 2; pointer-events: none; }
    .kitten-loader-corner::before, .kitten-loader-corner::after { content: ''; position: absolute; background: rgba(255,255,255,0.06); }
    .kitten-loader-corner.tl { top: 30px; left: 30px; }
    .kitten-loader-corner.tl::before { top: 0; left: 0; width: 40px; height: 1px; }
    .kitten-loader-corner.tl::after { top: 0; left: 0; width: 1px; height: 40px; }
    .kitten-loader-corner.tr { top: 30px; right: 30px; }
    .kitten-loader-corner.tr::before { top: 0; right: 0; width: 40px; height: 1px; }
    .kitten-loader-corner.tr::after { top: 0; right: 0; width: 1px; height: 40px; }
    .kitten-loader-corner.bl { bottom: 30px; left: 30px; }
    .kitten-loader-corner.bl::before { bottom: 0; left: 0; width: 40px; height: 1px; }
    .kitten-loader-corner.bl::after { bottom: 0; left: 0; width: 1px; height: 40px; }
    .kitten-loader-corner.br { bottom: 30px; right: 30px; }
    .kitten-loader-corner.br::before { bottom: 0; right: 0; width: 40px; height: 1px; }
    .kitten-loader-corner.br::after { bottom: 0; right: 0; width: 1px; height: 40px; }
</style>

<script>
// Replace instant loader hide with frosted-glass dissolve animation
(function(){
  var loader = document.getElementById('kitten-loader-wrap');
  if (!loader) return;
  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      if (m.attributeName === 'style' || m.attributeName === 'visibility') {
        var style = loader.style.visibility || window.getComputedStyle(loader).visibility;
        if (style === 'hidden' && !loader.classList.contains('k4-loader-done')) {
          // Intercept: replace instant hide with animated dissolve
          loader.style.visibility = 'visible';
          loader.classList.add('k4-loader-done');
          // Actually remove from DOM after animation completes
          setTimeout(function() {
            loader.style.visibility = 'hidden';
            loader.style.display = 'none';
          }, 900);
        }
      }
    });
  });
  observer.observe(loader, { attributes: true, attributeFilter: ['style', 'class'] });

  // Also catch direct style.visibility assignments via CSSStyleDeclaration proxy
  var origDescriptor = Object.getOwnPropertyDescriptor(CSSStyleDeclaration.prototype, 'visibility');
  if (origDescriptor && origDescriptor.configurable) {
    Object.defineProperty(loader.style, 'visibility', {
      get: function() { return origDescriptor.get.call(loader.style); },
      set: function(v) {
        if (v === 'hidden' && !loader.classList.contains('k4-loader-done')) {
          loader.classList.add('k4-loader-done');
          setTimeout(function() {
            origDescriptor.set.call(loader.style, 'hidden');
            loader.style.display = 'none';
          }, 900);
          return;
        }
        origDescriptor.set.call(loader.style, v);
      },
      configurable: true
    });
  }
})();
