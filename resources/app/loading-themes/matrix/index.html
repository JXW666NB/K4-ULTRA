<style>
#kitten-loader-wrap {
  position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 99;
  background: #000; overflow: hidden; font-family: "Courier New", monospace;
}
#matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.85; }
.matrix-overlay {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; z-index: 2; pointer-events: none;
}
.matrix-title { font-size: 64px; font-weight: 900; color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 30px #0f0; letter-spacing: 8px; }
.matrix-subtitle { font-size: 14px; color: #0f0; margin-top: 16px; opacity: 0.8; }
#offline-text { pointer-events: auto; display:inline-block; margin-top: 24px; padding: 8px 16px; border: 1px solid #0f0; color: #0f0; cursor: pointer; background: rgba(0,255,0,0.08); }
#offline-text:hover { background: rgba(0,255,0,0.2); }
</style>
<canvas id="matrix-canvas"></canvas>
<div class="matrix-overlay">
  <div class="matrix-title">K4 ULTRA</div>
  <div class="matrix-subtitle">SYSTEM BOOT SEQUENCE INITIALIZING...</div>
  <div id="offline-text" onclick="switch_mode()">离线打开</div>
</div>
<script>
(function(){
  var c = document.getElementById('matrix-canvas');
  var ctx = c.getContext('2d');
  function resize(){ c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight; }
  resize(); window.addEventListener('resize', resize);
  var chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  var fontSize = 16;
  var columns = Math.floor(c.width / fontSize);
  var drops = Array(columns).fill(1);
  function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle = '#0f0';
    ctx.font = fontSize + 'px monospace';
    for(var i=0;i<drops.length;i++){
      var text = chars.charAt(Math.floor(Math.random()*chars.length));
      ctx.fillText(text, i*fontSize, drops[i]*fontSize);
      if(drops[i]*fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 33);
})();
</script>
